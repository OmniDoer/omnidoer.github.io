<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">OmniDoer secure credential and login flow</title>
  <desc id="desc">The user enters secrets in the Control Client, secrets are encrypted to the Broker and Vault, policy verifies origin, the browser receives credentials, and the model only receives redacted status.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#0891b2"/>
    </marker>
    <style>
      .label { fill: #111827; font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-weight: 800; }
      .text { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      .tiny { fill: #64748b; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .dark { fill: #111827; }
      .guard { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; }
      .warn { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; }
      .line { stroke: #0891b2; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .muted-line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 8; }
      .blocked { stroke: #ef4444; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-dasharray: 10 8; }
    </style>
  </defs>
  <rect width="1120" height="620" rx="28" fill="#f8fafc"/>
  <text x="54" y="62" class="label" font-size="32">Secure credential lifecycle</text>
  <text x="54" y="94" class="text" font-size="17">The model may request credential use. It never receives the credential, OTP seed, cookie, or password value.</text>

  <rect x="54" y="132" width="210" height="130" rx="14" class="box"/>
  <text x="78" y="174" class="label" font-size="23">Control Client</text>
  <text x="78" y="204" class="text" font-size="15">User enters password,</text>
  <text x="78" y="228" class="text" font-size="15">TOTP seed, or one-time</text>
  <text x="78" y="252" class="text" font-size="15">challenge response.</text>

  <rect x="337" y="132" width="225" height="130" rx="14" class="dark"/>
  <text x="363" y="174" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="23" font-weight="800">Secure envelope</text>
  <text x="363" y="204" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">P-256 / X25519</text>
  <text x="363" y="228" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">HKDF + AES-GCM</text>
  <text x="363" y="252" fill="#67e8f9" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Bound to request + origin</text>

  <rect x="635" y="132" width="210" height="130" rx="14" class="box"/>
  <text x="661" y="174" class="label" font-size="23">Secret Broker</text>
  <text x="661" y="204" class="text" font-size="15">Decrypts only inside</text>
  <text x="661" y="228" class="text" font-size="15">the trusted path.</text>
  <text x="661" y="252" class="text" font-size="15">Returns status only.</text>

  <rect x="910" y="132" width="156" height="130" rx="14" class="guard"/>
  <text x="936" y="174" class="label" font-size="23">Vault</text>
  <text x="936" y="204" class="text" font-size="15">Argon2id</text>
  <text x="936" y="228" class="text" font-size="15">AES-GCM</text>
  <text x="936" y="252" class="text" font-size="15">0600 file</text>

  <path d="M264 197h73" class="line"/>
  <path d="M562 197h73" class="line"/>
  <path d="M845 197h65" class="muted-line"/>

  <rect x="154" y="342" width="230" height="140" rx="14" class="guard"/>
  <text x="180" y="384" class="label" font-size="23">Origin Policy</text>
  <text x="180" y="414" class="text" font-size="15">Top-level origin</text>
  <text x="180" y="438" class="text" font-size="15">Form action origin</text>
  <text x="180" y="462" class="text" font-size="15">HTTPS or loopback demo</text>

  <rect x="456" y="342" width="230" height="140" rx="14" class="box"/>
  <text x="482" y="384" class="label" font-size="23">Browser Fill</text>
  <text x="482" y="414" class="text" font-size="15">Chromium receives</text>
  <text x="482" y="438" class="text" font-size="15">credentials through a</text>
  <text x="482" y="462" class="text" font-size="15">non-observed path.</text>

  <rect x="758" y="342" width="230" height="140" rx="14" class="warn"/>
  <text x="784" y="384" class="label" font-size="23">Model View</text>
  <text x="784" y="414" class="text" font-size="15">Redacted DOM</text>
  <text x="784" y="438" class="text" font-size="15">Action status</text>
  <text x="784" y="462" class="text" font-size="15">No secret values</text>

  <path d="M740 262c-8 46-88 58-210 80" class="line"/>
  <path d="M384 412h72" class="line"/>
  <path d="M686 412h72" class="muted-line"/>
  <path d="M743 262c70 36 93 58 130 80" class="blocked"/>
  <text x="782" y="306" fill="#b91c1c" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">secret export blocked</text>

  <rect x="54" y="532" width="1012" height="48" rx="12" fill="#e0f2fe"/>
  <text x="78" y="562" class="label" font-size="17">Invariant:</text>
  <text x="160" y="562" class="text" font-size="17">Codex can request login, but only Broker + Vault + Policy + Browser may cause a secret to be used.</text>
</svg>
