<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">OmniDoer human takeover and challenge state machine</title>
  <desc id="desc">When anti-bot, MFA, passkey, registration, or payment judgment requires a human, the agent pauses, streams the browser to the Control Client, the user completes the action, and the agent resumes after release.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#0891b2"/>
    </marker>
    <style>
      .label { fill: #111827; font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-weight: 800; }
      .text { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .pause { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; }
      .control { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; }
      .safe { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; }
      .dark { fill: #111827; }
      .line { stroke: #0891b2; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .guard { stroke: #ef4444; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-dasharray: 10 8; }
    </style>
  </defs>
  <rect width="1120" height="620" rx="28" fill="#f8fafc"/>
  <text x="54" y="62" class="label" font-size="32">Human takeover for 2FA, anti-bot, and registration</text>
  <text x="54" y="94" class="text" font-size="17">OmniDoer does not solve or bypass challenges. It hands the live browser to the user and resumes after Release Control.</text>

  <rect x="58" y="148" width="195" height="112" rx="14" class="box"/>
  <text x="82" y="188" class="label" font-size="22">Agent drives</text>
  <text x="82" y="218" class="text" font-size="15">Navigate, inspect, fill</text>
  <text x="82" y="242" class="text" font-size="15">safe non-secret forms.</text>

  <rect x="328" y="132" width="220" height="144" rx="14" class="pause"/>
  <text x="354" y="174" class="label" font-size="22">Challenge detected</text>
  <text x="354" y="204" class="text" font-size="15">CAPTCHA / anti-bot</text>
  <text x="354" y="228" class="text" font-size="15">MFA / Passkey / 3DS</text>
  <text x="354" y="252" class="text" font-size="15">Registration or judgment</text>

  <rect x="626" y="132" width="220" height="144" rx="14" class="dark"/>
  <text x="652" y="174" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">Agent paused</text>
  <text x="652" y="204" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">No automation continues</text>
  <text x="652" y="228" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Frames marked not_for_llm</text>
  <text x="652" y="252" fill="#67e8f9" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Request visible to user</text>

  <rect x="912" y="148" width="150" height="112" rx="14" class="control"/>
  <text x="936" y="188" class="label" font-size="22">Stream</text>
  <text x="936" y="218" class="text" font-size="15">Screenshot frames</text>
  <text x="936" y="242" class="text" font-size="15">to Control Client</text>

  <path d="M253 204h75" class="line"/>
  <path d="M548 204h78" class="line"/>
  <path d="M846 204h66" class="line"/>

  <rect x="148" y="366" width="230" height="132" rx="14" class="control"/>
  <text x="174" y="408" class="label" font-size="22">User takes over</text>
  <text x="174" y="438" class="text" font-size="15">Touch, mouse, keyboard</text>
  <text x="174" y="462" class="text" font-size="15">go to the real browser.</text>
  <text x="174" y="486" class="text" font-size="15">Text is not logged.</text>

  <rect x="450" y="366" width="230" height="132" rx="14" class="pause"/>
  <text x="476" y="408" class="label" font-size="22">User completes</text>
  <text x="476" y="438" class="text" font-size="15">2FA, passkey, CAPTCHA,</text>
  <text x="476" y="462" class="text" font-size="15">registration, payment</text>
  <text x="476" y="486" class="text" font-size="15">review, or judgment.</text>

  <rect x="752" y="366" width="220" height="132" rx="14" class="safe"/>
  <text x="778" y="408" class="label" font-size="22">Release Control</text>
  <text x="778" y="438" class="text" font-size="15">Challenge status only</text>
  <text x="778" y="462" class="text" font-size="15">returns to MCP.</text>
  <text x="778" y="486" class="text" font-size="15">Agent resumes safely.</text>

  <path d="M987 260c-15 70-112 97-609 144" class="line"/>
  <path d="M378 432h72" class="line"/>
  <path d="M680 432h72" class="line"/>
  <path d="M535 366c-36-70-20-90 80-112" class="guard"/>
  <text x="420" y="322" fill="#b91c1c" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">answers never returned to model</text>

  <rect x="54" y="540" width="1012" height="48" rx="12" fill="#e0f2fe"/>
  <text x="78" y="570" class="label" font-size="17">State contract:</text>
  <text x="198" y="570" class="text" font-size="17">Detect challenge -> pause Agent -> user controls live browser -> release -> redacted observation resumes.</text>
</svg>
