<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">OmniDoer Cloud Direct architecture</title>
  <desc id="desc">Control Client connects by HTTPS and WSS to a user-owned cloud Control Service, which connects internally to Broker, Vault, Browser Controller, and Codex MCP.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#0891b2"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #CBD5E1; stroke-width: 2; }
      .strong { fill: #111827; font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-weight: 700; }
      .muted { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      .line { stroke: #0891b2; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .local { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect width="1120" height="520" rx="28" fill="#f8fafc"/>
  <rect x="48" y="86" width="245" height="130" rx="14" class="box"/>
  <text x="74" y="126" class="strong" font-size="24">Control Client</text>
  <text x="74" y="160" class="muted" font-size="17">Android / Windows / PWA</text>
  <text x="74" y="188" class="muted" font-size="15">Secrets encrypted locally</text>
  <rect x="405" y="74" width="310" height="156" rx="14" fill="#111827"/>
  <text x="435" y="120" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="700">Control Service</text>
  <text x="435" y="154" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">User-owned cloud server</text>
  <text x="435" y="184" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">TLS + pairing + sessions</text>
  <text x="435" y="210" fill="#67e8f9" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">No third-party relay</text>
  <rect x="827" y="54" width="245" height="94" rx="14" class="box"/>
  <text x="852" y="94" class="strong" font-size="23">Secret Broker</text>
  <text x="852" y="124" class="muted" font-size="15">Decrypts and fills only</text>
  <rect x="827" y="180" width="245" height="94" rx="14" class="box"/>
  <text x="852" y="220" class="strong" font-size="23">Browser Controller</text>
  <text x="852" y="250" class="muted" font-size="15">Headless Chromium</text>
  <rect x="827" y="306" width="245" height="94" rx="14" class="box"/>
  <text x="852" y="346" class="strong" font-size="23">Vault + Audit</text>
  <text x="852" y="376" class="muted" font-size="15">Encrypted, redacted records</text>
  <rect x="405" y="338" width="310" height="94" rx="14" class="box"/>
  <text x="435" y="378" class="strong" font-size="23">Codex CLI + MCP</text>
  <text x="435" y="408" class="muted" font-size="15">Model entry stays in Codex</text>
  <path d="M293 151h112" class="line"/>
  <text x="302" y="133" class="muted" font-size="15">HTTPS / WSS</text>
  <path d="M715 116h112" class="local"/>
  <path d="M715 175c50 34 62 52 112 52" class="local"/>
  <path d="M715 206c54 86 66 136 112 148" class="local"/>
  <path d="M560 338V230" class="local"/>
  <text x="64" y="306" class="strong" font-size="22">Security boundary</text>
  <text x="64" y="338" class="muted" font-size="16">The Control Service transports requests.</text>
  <text x="64" y="366" class="muted" font-size="16">Broker, Vault, Policy, Browser isolation,</text>
  <text x="64" y="394" class="muted" font-size="16">and Approval Gate enforce secret handling.</text>
</svg>
